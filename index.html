<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Video</title>

<style>
body{
    margin:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}
.player{
    width:95vw;
    max-width:1200px;
    aspect-ratio:16/9;
}
iframe{
    width:100%;
    height:100%;
    border:0;
}
</style>
</head>

<body>

<div class="player" id="player"></div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if (!id || !/^tt\d+$/.test(id)) {
    document.getElementById("player").innerHTML = "<div style='color:white;font-family:Arial'>ID invalid sau lipsă.</div>";
} else {
    document.getElementById("player").innerHTML = `
        <iframe
            src="https://vidsrc-embed.ru/embed/movie?imdb=${id}&ds_lang=ro&autoplay=1"
            allowfullscreen
            allow="autoplay; fullscreen">
        </iframe>
    `;
}
</script>

</body>
</html>
