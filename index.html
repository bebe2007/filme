<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">

<!-- Face pagina responsive pe telefon, tabletă, TV, laptop -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bratu Marian</title>

<style>
/* Reset complet pentru a elimina marginile și scroll-ul */
html,
body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
}

/* Containerul playerului ocupă tot ecranul */
#player {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    background: #000;
}

/* Iframe-ul ocupă tot containerul */
iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    background: #000;
}

/* Mesaj pentru ID lipsă sau invalid */
.error-message {
    width: 100%;
    height: 100%;
    color: #fff;
    background: #000;
    font-family: Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    box-sizing: border-box;
}
</style>
</head>

<body>

<!-- Aici se încarcă automat playerul -->
<div id="player"></div>

<script>
/*
    Link film:
    https://bebe2007.github.io/filme/?id=tt19759204

    Link serial / episod:
    https://bebe2007.github.io/filme/?id=tt0944947&type=tv&season=1&episode=1
*/

const params = new URLSearchParams(window.location.search);

const id = params.get("id");
const type = params.get("type") || "movie";
const season = params.get("season");
const episode = params.get("episode");

const player = document.getElementById("player");

/* Verifică dacă ID-ul IMDb este valid */
if (!id || !/^tt\d+$/.test(id)) {
    player.innerHTML = `
        <div class="error-message">
            ID invalid sau lipsă.<br>
            Exemplu corect:<br>
            ?id=tt19759204
        </div>
    `;
} else {

    let embedUrl = "";

    /*
        Dacă type=tv și există season + episode,
        se încarcă episodul serialului.
    */
    if (type === "tv" && season && episode) {
        embedUrl = `https://vidsrc-embed.ru/embed/tv?imdb=${id}&season=${season}&episode=${episode}&ds_lang=ro&autoplay=1&autonext=1`;
    } else {
        /*
            Implicit se încarcă film.
            Pentru filme nu trebuie type=movie în link.
        */
        embedUrl = `https://vidsrc-embed.ru/embed/movie?imdb=${id}&ds_lang=ro&autoplay=1`;
    }

    /*
        allowfullscreen + webkitallowfullscreen + mozallowfullscreen
        ajută pentru fullscreen pe browsere diferite.
    */
    player.innerHTML = `
        <iframe
            src="${embedUrl}"
            allowfullscreen
            webkitallowfullscreen
            mozallowfullscreen
            allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
            referrerpolicy="no-referrer">
        </iframe>
    `;
}
</script>

</body>
</html>
